<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Universe | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    .music-wrap {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 70px 0;
    }

    .music-hero {
      text-align: center;
      margin-bottom: 34px;
    }

    .music-hero h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.95;
      text-shadow: var(--glow-strong);
    }

    .release-stage {
      display: grid;
      grid-template-columns: minmax(230px, 330px) minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .release-cover,
    .release-panel,
    .stream-panel {
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 8px;
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-sm);
    }

    .release-cover {
      overflow: hidden;
      margin: 0;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .release-cover img {
      width: 100%;
      height: 100%;
      min-height: 280px;
      object-fit: cover;
      display: block;
    }

    .release-cover figcaption {
      padding: 14px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .release-panel {
      padding: 24px;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .release-panel h2 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
    }

    #featured-player audio {
      width: 100%;
      margin-top: 4px;
    }

    .cta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .music-cta,
    .stream-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      color: #fff;
      background: rgba(255,255,255,0.055);
      font-weight: 800;
      text-decoration: none;
    }

    .music-cta.primary {
      border-color: transparent;
      background: linear-gradient(135deg, #1f6feb, #00a6ff);
    }

    .music-cta:hover,
    .stream-links a:hover {
      transform: translateY(-3px);
      opacity: 1;
    }

    .stream-panel {
      margin-top: 18px;
      padding: 22px;
    }

    .stream-panel h2 {
      margin: 0 0 14px;
    }

    .stream-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 760px) {
      .music-wrap {
        width: min(100% - 24px, 1080px);
        padding: 48px 0;
      }

      .release-stage {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>
  <script src="shared/nav.js"></script>

  <main class="music-wrap">
    <section class="music-hero">
      <h1>AUDIO UNIVERSE</h1>
    </section>

    <section class="release-stage" aria-label="Featured release">
      <figure class="release-cover">
        <img src="assets/img/no-drama.jpg" alt="No Drama cover art">
        <figcaption>No Drama - The Grei Show</figcaption>
      </figure>

      <div class="release-panel">
        <p class="eyebrow">Featured Transmission</p>
        <h2>No Drama</h2>
        <div id="featured-player" aria-live="polite"></div>
        <div class="cta-row">
          <a class="music-cta primary" href="https://snd.click/qnbs" target="_blank" rel="noopener">Listen Now</a>
        </div>
      </div>
    </section>

    <section class="stream-panel" aria-label="Streaming links">
      <h2>Stream Music</h2>
      <div class="stream-links">
        <a href="https://open.spotify.com/artist/78LUuzis8k8cGRCalx751k" target="_blank" rel="noopener">Spotify</a>
        <a href="https://music.apple.com/jm/artist/the-grei-show/885841733" target="_blank" rel="noopener">Apple Music</a>
        <a href="https://soundcloud.com/thegreishow" target="_blank" rel="noopener">SoundCloud</a>
        <a href="https://music.youtube.com/@thegreishxw?si=caga_AxUEGLyyT6r" target="_blank" rel="noopener">YouTube Music</a>
        <a href="https://tidal.com/artist/47307553/u" target="_blank" rel="noopener">TIDAL</a>
        <a href="https://thegreishow.bandcamp.com" target="_blank" rel="noopener">Bandcamp</a>
      </div>
    </section>
  </main>

  <script src="assets/js/portal.js"></script>
  <script>
    async function loadFeatured() {
      try {
        const res = await fetch('assets/data/cms.json');
        const cms = await res.json();
        const container = document.getElementById('featured-player');
        const track = cms?.music?.featured;

        if (container && track) {
          container.innerHTML = `
            <audio controls preload="metadata">
              <source src="${track.url}" type="audio/mpeg">
            </audio>
          `;
        }
      } catch (e) {
        console.error('Featured load failed', e);
      }
    }

    loadFeatured();
  </script>

</body>
</html>
