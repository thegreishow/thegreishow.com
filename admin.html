<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | The Grei Show CMS</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    body { padding: 2rem; font-family: sans-serif; }
    textarea { width: 100%; height: 70vh; background: #0b0b0f; color: #fff; padding: 1rem; border: 1px solid #333; }
    button { margin-top: 1rem; padding: 1rem 2rem; }
  </style>
</head>
<body>

  <h1>CMS ADMIN PANEL</h1>

  <p>Edit your entire universe from one file:</p>

  <textarea id="cmsEditor"></textarea>

  <button onclick="downloadCMS()">Download CMS Update</button>

  <script>
    async function loadCMS() {
      const res = await fetch('assets/data/cms.json');
      const data = await res.json();
      document.getElementById('cmsEditor').value = JSON.stringify(data, null, 2);
    }

    function downloadCMS() {
      const data = document.getElementById('cmsEditor').value;
      const blob = new Blob([data], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cms.json';
      a.click();
    }

    loadCMS();
  </script>

</body>
</html>
