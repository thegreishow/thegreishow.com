<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Sessions | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    .media-page {
      position: relative;
      z-index: 1;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .media-card {
      overflow: hidden;
    }

    .media-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,200,255,0.35);
    }

    .coming-soon {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      font-weight: 800;
    }

    footer {
      text-align: center;
      margin-top: 64px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <div id="site-header"></div>
  <script src="shared/nav.js"></script>

  <main class="page-shell media-page">
    <a class="back-link" href="visuals.html">Back to Visuals</a>

    <section class="page-hero">
      <p class="eyebrow">Performance</p>
      <h1>Live Sessions</h1>
      <p>Raw performances, stage moments, sound-system clips, studio sessions, and stripped-back transmissions.</p>
    </section>

    <section class="media-grid" id="liveGrid" aria-label="Live sessions archive"></section>

    <footer>THE GREI SHOW &copy; 2026 - Visual Universe</footer>
  </main>

  <script src="assets/js/media-engine.js"></script>
  <script>
    const grid = document.getElementById('liveGrid');

    function render() {
      const sessions = MediaEngine.getAll('liveSessions');

      grid.innerHTML = sessions.map(session => `
        <article class="section-panel media-card">
          <div class="media-card__thumb">
            ${session.id ? `
              <iframe
                src="https://www.youtube.com/embed/${session.id}?autoplay=0&mute=1&rel=0"
                title="${session.title}"
                loading="lazy"
                allowfullscreen>
              </iframe>
            ` : '<div class="coming-soon">Coming Soon</div>'}
          </div>
          <div class="media-card__body">
            <h3>${session.title}</h3>
            <p>${session.type || 'Live Session'}</p>
          </div>
        </article>
      `).join('');
    }

    render();
  </script>

</body>
</html>
