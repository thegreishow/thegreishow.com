<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Signal Runner | The Grei Show Arcade</title><style>
*{box-sizing:border-box}html,body{margin:0;background:#05080d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overscroll-behavior:none}body{min-height:100vh}.wrap{width:min(1100px,100%);margin:auto;padding:10px;display:grid;gap:10px}.hud{display:flex;justify-content:space-between;gap:8px;align-items:center}.title h1{margin:0;font-size:clamp(1.6rem,6vw,3.4rem);line-height:.9}.title p{margin:6px 0 0;color:#9ba8b7;font-size:12px}.stats{display:flex;gap:6px}.stat{min-width:64px;padding:8px;border:1px solid #263241;border-radius:10px;background:#0d141e;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:9px;color:#8da0b5;text-transform:uppercase}.stage{position:relative;border:1px solid #263241;border-radius:14px;overflow:hidden;background:#07101a;min-height:55vh}.stage canvas{display:block;width:100%;height:100%;min-height:55vh;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(2,5,9,.78);padding:20px}.overlay[hidden]{display:none}.panel{max-width:520px;padding:26px;border:1px solid #2d3a4b;border-radius:16px;background:rgba(8,14,22,.94);text-align:center}.panel h2{font-size:clamp(2rem,9vw,4rem);margin:0 0 8px}.panel p{color:#a6b2c0;line-height:1.5}.btn{min-height:48px;padding:0 18px;border:0;border-radius:999px;background:linear-gradient(135deg,#1f6feb,#00b7ff);color:#fff;font-weight:900}.touch{display:grid;grid-template-columns:1fr 1fr;gap:12px}.touch button{height:76px;border:1px solid #2a3a4d;border-radius:16px;background:#0f1824;color:#fff;font-size:28px;font-weight:900;touch-action:none}.touch button:active{background:#163354}.hint{text-align:center;color:#8795a6;font-size:11px}.pulse{animation:pulse .2s}@keyframes pulse{50%{filter:brightness(2)}}@media(orientation:landscape) and (max-height:650px){.wrap{grid-template-columns:1fr 190px;grid-template-areas:'hud hud' 'stage controls';height:calc(100vh - 62px)}.hud{grid-area:hud}.stage{grid-area:stage;min-height:0}.stage canvas{min-height:0;height:100%}.touch{grid-area:controls;grid-template-columns:1fr;align-content:center}.touch button{height:110px}.hint{display:none}}
</style></head><body><script src="../../engine/game-shell.js"></script><main class="wrap"><header class="hud"><div class="title"><h1>Signal Runner</h1><p>Catch blue signals. Dodge red static.</p></div><div class="stats"><div class="stat"><b id="score">0</b><span>Score</span></div><div class="stat"><b id="lives">3</b><span>Lives</span></div><div class="stat"><b id="best">0</b><span>Best</span></div></div></header><section class="stage" id="stage"><canvas id="game" width="960" height="540"></canvas><div class="overlay" id="overlay"><div class="panel"><h2 id="ot">READY?</h2><p id="oc">Slide left and right. Collect blue signals and avoid red static.</p><button class="btn" id="start">Start Run</button></div></div></section><section class="touch"><button id="left" aria-label="Move left">◀</button><button id="right" aria-label="Move right">▶</button></section><div class="hint">Keyboard: A/D or arrows · P pauses · Fullscreen is available above</div></main><script>
(()=>{const API='https://grei-arcade-api.thegreishow.workers.dev',GAME='signal-runner',c=document.getElementById('game'),x=c.getContext('2d'),scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),bestEl=document.getElementById('best'),overlay=document.getElementById('overlay'),ot=document.getElementById('ot'),oc=document.getElementById('oc'),stage=document.getElementById('stage');let score=0,lives=3,best=+localStorage.getItem('grei-signal-runner-best')||0,running=false,paused=false,last=0,spawn=0,speed=190,items=[],keys=new Set(),startedAt=0;const p={x:480,y:490,w:82,h:22,s:520};bestEl.textContent=best;function reset(){score=0;lives=3;speed=190;items=[];spawn=0;p.x=c.width/2;hud()}function hud(){scoreEl.textContent=score;livesEl.textContent=lives;bestEl.textContent=best}function begin(){reset();running=true;paused=false;startedAt=Date.now();last=performance.now();overlay.hidden=true;requestAnimationFrame(loop)}async function submit(){const name=(localStorage.getItem('grei_arcade_player_name')||'Dreamer').slice(0,18),duration=Math.max(1,Math.round((Date.now()-startedAt)/1000));try{const r=await fetch(API+'/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAME,name,score,level:1,duration})});if(!r.ok)throw 0;oc.textContent=`Final score: ${score}. Added to the global leaderboard.`}catch{oc.textContent=`Final score: ${score}. Saved locally; global sync is unavailable.`}}function end(){running=false;best=Math.max(best,score);localStorage.setItem('grei-signal-runner-best',best);hud();ot.textContent='TRANSMISSION LOST';oc.textContent=`Final score: ${score}. Submitting to the global leaderboard…`;document.getElementById('start').textContent='Run Again';overlay.hidden=false;submit()}function add(){const bad=Math.random()<Math.min(.38,.18+score/900);items.push({x:35+Math.random()*(c.width-70),y:-30,size:bad?30:24,bad,v:speed+Math.random()*120})}function update(dt){let d=(keys.has('ArrowRight')||keys.has('d')?1:0)-(keys.has('ArrowLeft')||keys.has('a')?1:0);p.x=Math.max(p.w/2,Math.min(c.width-p.w/2,p.x+d*p.s*dt));spawn-=dt;if(spawn<=0){add();spawn=Math.max(.24,.78-score/700)}for(const i of items)i.y+=i.v*dt;items=items.filter(i=>{const hit=Math.abs(i.x-p.x)<(i.size+p.w)/2&&Math.abs(i.y-p.y)<(i.size+p.h)/2;if(hit){if(i.bad){lives--;stage.classList.add('pulse');setTimeout(()=>stage.classList.remove('pulse'),180);if(lives<=0)end()}else{score+=10;speed+=3}hud();return false}if(i.y>c.height+40){if(!i.bad)score=Math.max(0,score-2);hud();return false}return true})}function draw(){x.fillStyle='#07101a';x.fillRect(0,0,c.width,c.height);x.strokeStyle='rgba(255,255,255,.045)';for(let q=0;q<c.width;q+=48){x.beginPath();x.moveTo(q,0);x.lineTo(q,c.height);x.stroke()}for(let q=0;q<c.height;q+=48){x.beginPath();x.moveTo(0,q);x.lineTo(c.width,q);x.stroke()}for(const i of items){x.save();x.translate(i.x,i.y);x.shadowBlur=20;x.shadowColor=i.bad?'#ff3d71':'#00c8ff';x.fillStyle=i.bad?'#ff3d71':'#00c8ff';if(i.bad){x.rotate(i.y*.02);x.fillRect(-i.size/2,-i.size/2,i.size,i.size)}else{x.beginPath();x.arc(0,0,i.size/2,0,Math.PI*2);x.fill()}x.restore()}x.save();x.translate(p.x,p.y);x.shadowColor='#00c8ff';x.shadowBlur=22;x.fillStyle='#fff';x.fillRect(-p.w/2,-p.h/2,p.w,p.h);x.fillStyle='#00c8ff';x.fillRect(-p.w/2+8,-p.h/2-8,p.w-16,6);x.restore()}function loop(t){if(!running||paused)return;const dt=Math.min((t-last)/1000,.033);last=t;update(dt);draw();if(running&&!paused)requestAnimationFrame(loop)}document.getElementById('start').onclick=begin;addEventListener('keydown',e=>{keys.add(e.key);if(e.code==='Space'&&!running)begin()});addEventListener('keyup',e=>keys.delete(e.key));for(const [id,key] of [['left','ArrowLeft'],['right','ArrowRight']]){const b=document.getElementById(id);['pointerdown','touchstart'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys.add(key)}));['pointerup','pointercancel','touchend'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys.delete(key)}))}addEventListener('grei:pause',e=>{paused=e.detail.paused;if(!paused&&running){last=performance.now();requestAnimationFrame(loop)}});draw()})();
</script></body></html>
