<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentaries | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    .media-page {
      position: relative;
      z-index: 1;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }

    .media-card {
      overflow: hidden;
    }

    .media-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,200,255,0.35);
    }

    footer {
      text-align: center;
      margin-top: 64px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <div id="site-header"></div>
  <script src="shared/nav.js"></script>

  <main class="page-shell media-page">
    <a class="back-link" href="visuals.html">Back to Visuals</a>

    <section class="page-hero">
      <p class="eyebrow">Archive</p>
      <h1>Documentaries</h1>
      <p>Story-driven visual archives, interviews, process films, and behind-the-scenes transmissions.</p>
    </section>

    <section class="media-grid" id="docGrid" aria-label="Documentary archive"></section>

    <footer>THE GREI SHOW &copy; 2026 - Visual Universe</footer>
  </main>

  <script src="assets/js/media-engine.js"></script>
  <script>
    const grid = document.getElementById('docGrid');

    function render() {
      const documentaries = MediaEngine.getAll('documentaries');

      grid.innerHTML = documentaries.map(doc => `
        <article class="section-panel media-card">
          <div class="media-card__thumb">
            <iframe
              src="https://www.youtube.com/embed/${doc.id}?autoplay=0&mute=1&rel=0"
              title="${doc.title}"
              loading="lazy"
              allowfullscreen>
            </iframe>
          </div>
          <div class="media-card__body">
            <h3>${doc.title}</h3>
            <p>${doc.type || 'Documentary'}</p>
          </div>
        </article>
      `).join('');
    }

    render();
  </script>

</body>
</html>
