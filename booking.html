<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings &amp; Projects | The Grei Show</title>
  <meta name="description" content="Bookings and project inquiries for The Grei Show now live on one unified Work with Grei page.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://thegreishow.com/connect">
  <meta http-equiv="refresh" content="1; url=connect.html">
</head>
<body>
  <main>
    <h1>Bookings moved to Work with Grei</h1>
    <p>All bookings, projects, press, licensing, and partnerships now use one inquiry page.</p>
    <p><a href="connect.html">Continue to Work with Grei</a></p>
  </main>
  <script>
    const serviceAliases = {
      'The Grei Show — Live Performance': 'live-performance',
      'DJ Set': 'dj-set',
      'Music Production / Studio Session': 'studio-session',
      'Studio Session / Production Consultation': 'studio-session',
      'Photography / Video': 'photo-video',
      'Talent Booking — White Line Entertainment': 'talent-booking',
      'Kingston Experience / Tour': 'kingston-experience'
    };
    const params = new URLSearchParams(window.location.search);
    const requestedInterest = params.get('interest') || params.get('service');
    const interest = serviceAliases[requestedInterest] || requestedInterest;

    params.delete('service');
    if (interest) params.set('interest', interest);

    const query = params.toString();
    const target = `connect.html${query ? `?${query}` : ''}${window.location.hash}`;
    window.location.replace(target);
  </script>
</body>
</html>
