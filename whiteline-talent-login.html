<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>White Line Talent Portal</title>
  <style>
    :root{color-scheme:dark;--bg:#03060c;--panel:#0a1320;--line:rgba(255,255,255,.12);--text:#f5f7fb;--muted:#9eabba;--accent:#d8ff63}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 80% 10%,rgba(216,255,99,.12),transparent 30%),var(--bg);color:var(--text);font:16px/1.5 system-ui,sans-serif}.shell{width:min(520px,100%);padding:28px;border:1px solid var(--line);border-radius:24px;background:rgba(10,19,32,.95)}h1{margin:0 0 10px;font-size:clamp(2.2rem,8vw,4.2rem);letter-spacing:-.06em;line-height:.95}.muted{color:var(--muted)}form{display:grid;gap:14px;margin-top:24px}label{display:grid;gap:7px;color:var(--muted);font-size:.9rem}input{width:100%;padding:14px;border:1px solid var(--line);border-radius:13px;background:#03070d;color:var(--text);font:inherit}button,.button{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--text);font-weight:850;text-decoration:none;cursor:pointer}.primary{background:var(--accent);border-color:var(--accent);color:#071018}.actions{display:flex;gap:10px;flex-wrap:wrap}.status{margin-top:16px;padding:13px;border:1px solid var(--line);border-radius:13px;color:var(--muted);background:rgba(255,255,255,.025)}.fine{font-size:.82rem;color:var(--muted)}
  </style>
</head>
<body>
  <main class="shell">
    <p class="muted">WHITE LINE ENTERTAINMENT</p>
    <h1>Talent portal</h1>
    <p class="muted">Sign in to manage your profile, submit updates, view casting calls and respond to assigned bookings.</p>

    <form id="login-form">
      <label>Email<input name="email" type="email" autocomplete="email" required></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" minlength="8" required></label>
      <div class="actions"><button class="primary" type="submit">Sign in</button><button id="signup" type="button">Create account</button></div>
    </form>

    <div id="status" class="status" hidden></div>
    <p class="fine">Your account email must match the email White Line has enabled on your approved talent profile.</p>
    <a class="button" href="whiteline.html">Back to White Line</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/whiteline-supabase-config.js"></script>
  <script src="assets/js/whiteline-talent-login.js"></script>
</body>
</html>
