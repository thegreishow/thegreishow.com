<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Grei Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      text-align: center;
      padding: 80px 20px 40px;
    }

    h1 {
      font-size: 50px;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #151515;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      background: #222;
      transform: scale(1.05);
    }

    a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>THE GREI SHOW</h1>
  <p>Artist • Producer • Creator • World Builder</p>
</header>

<div class="grid">

  <div class="card"><a href="#">🎵 Music</a></div>
  <div class="card"><a href="#">🎥 Aluminum TV</a></div>
  <div class="card"><a href="#">🎚️ Wheel It! Records</a></div>
  <div class="card"><a href="#">🔊 UGIS</a></div>
  <div class="card"><a href="#">📚 The Astral Thread</a></div>
  <div class="card"><a href="#">🎮 Arcade</a></div>
  <div class="card"><a href="#">🛒 Merch (Shopify)</a></div>
  <div class="card"><a href="#">📅 Bookings</a></div>

</div>

<footer>
  © The Grei Show Universe
</footer>

</body>
</html>
