<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Portal</title>

  <meta name="description" content="The Grei Show official portal - music, visuals, arcade, merch and creative universe">
  <meta property="og:title" content="The Grei Show | Portal">
  <meta property="og:description" content="Enter the creative universe of The Grei Show">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(140,80,255,0.18), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.04), transparent 60%);
      pointer-events:none;
      animation:drift 14s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.15)}
    }

    .portal{
      position:relative;
      z-index:2;
      max-width:1200px;
      margin:0 auto;
      padding:70px 20px;
    }

    .hero{
      text-align:center;
      margin-bottom:70px;
      animation:fadeUp 1.1s ease;
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(20px)}
      to{opacity:1; transform:translateY(0)}
    }

    .hero h1{
      font-family:var(--font-heading);
      font-size:clamp(3rem,6vw,5rem);
      letter-spacing:10px;
      text-shadow:var(--glow-strong);
      margin-bottom:8px;
    }

    .hero p{
      color:var(--text-dim);
      letter-spacing:4px;
      text-transform:uppercase;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:18px;
    }

    .card{
      position:relative;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      backdrop-filter:blur(14px);
      padding:22px;
      text-align:center;
      border-radius:18px;
      text-decoration:none;
      color:var(--text);
      transition:0.35s ease;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-6px) scale(1.02);
      box-shadow:var(--glow-strong);
    }

    .emoji{
      font-size:2rem;
      display:block;
      margin-bottom:10px;
    }

    footer{
      text-align:center;
      margin-top:70px;
      color:var(--text-dim);
      font-size:0.85rem;
      letter-spacing:1px;
    }
  </style>
</head>

<body>

  <div class="portal">

    <div class="hero">
      <h1>THE GREI SHOW</h1>
      <p>ENTER THE CREATIVE UNIVERSE</p>
    </div>

    <div class="grid">
      <a class="card" href="music.html"><span class="emoji">🎵</span>MUSIC</a>
      <a class="card" href="visuals.html"><span class="emoji">📺</span>VISUALS</a>
      <a class="card" href="wheel-it-records.html"><span class="emoji">💿</span>WHEEL IT! RECORDS</a>
      <a class="card" href="photography.html"><span class="emoji">📷</span>PHOTOGRAPHY</a>
      <a class="card" href="arcade.html"><span class="emoji">🎮</span>ARCADE</a>
      <a class="card" href="merch.html"><span class="emoji">🛍️</span>MERCH</a>
      <a class="card" href="astralthread.html"><span class="emoji">📚</span>ASTRAL THREAD</a>
      <a class="card" href="connect.html"><span class="emoji">📬</span>CONNECT</a>
      <a class="card" href="about.html"><span class="emoji">👤</span>ABOUT</a>
    </div>

    <footer>THE GREI SHOW © 2026</footer>

  </div>

  <audio id="bg-music" src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" loop></audio>

  <script>
    const audio=document.getElementById('bg-music');
    window.addEventListener('load',()=>{audio.volume=0.25;audio.play().catch(()=>{})});
    document.addEventListener('click',()=>{if(audio.paused)audio.play()},{once:true});
  </script>

</body>
</html>
