<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Portal</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at top, #151525, #07070b 70%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(120,80,255,0.15), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(0,200,255,0.08), transparent 60%);
      pointer-events: none;
      animation: drift 12s infinite alternate ease-in-out;
    }

    @keyframes drift {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .portal {
      width: 100%;
      max-width: 1100px;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }

    .title {
      text-align: center;
      font-size: clamp(3rem, 6vw, 5rem);
      margin-bottom: 3rem;
      letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 0 20px rgba(120,80,255,0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 2rem;
      text-align: center;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 0 30px rgba(120,80,255,0.25);
    }

    .emoji {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }

    /* subtle floating animation */
    .card {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>

<body>

  <div class="portal">
    <h1 class="title">THE GREI SHOW</h1>

    <div class="grid">
      <a class="card" href="music.html">
        <span class="emoji">🎵</span>
        MUSIC
      </a>

      <a class="card" href="visuals.html">
        <span class="emoji">📺</span>
        VISUALS
      </a>

      <a class="card" href="arcade.html">
        <span class="emoji">🎮</span>
        ARCADE
      </a>

      <a class="card" href="wheelit.html">
        <span class="emoji">🌿</span>
        WHEEL IT
      </a>

      <a class="card" href="astralthread.html">
        <span class="emoji">📚</span>
        ASTRAL THREAD
      </a>

      <a class="card" href="connect.html">
        <span class="emoji">📬</span>
        CONNECT
      </a>

      <a class="card" href="epk.html">
        <span class="emoji">📄</span>
        EPK
      </a>
    </div>
  </div>

  <!-- BACKGROUND MUSIC SYSTEM -->
  <audio id="bg-music" src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" loop></audio>

  <script>
    const audio = document.getElementById('bg-music');

    // attempt autoplay
    window.addEventListener('load', () => {
      audio.volume = 0.25;
      audio.play().catch(() => {
        console.log('Autoplay blocked, waiting for user interaction');
      });
    });

    // fallback interaction trigger
    document.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      }
    }, { once: true });
  </script>

</body>
</html>
