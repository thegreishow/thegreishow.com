<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Videos | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 25% 20%, rgba(140,80,255,0.18), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%);
      pointer-events:none;
      animation:drift 14s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.12)}
    }

    .wrap{
      position:relative;
      z-index:2;
      max-width:1150px;
      margin:0 auto;
      padding:70px 20px;
    }

    .nav a{
      color:var(--text-dim);
      text-decoration:none;
      font-weight:600;
    }

    .nav a:hover{color:var(--accent)}

    h1{
      text-align:center;
      font-size:clamp(2.8rem,5vw,4.2rem);
      letter-spacing:6px;
      text-shadow:var(--glow-strong);
      margin-bottom:10px;
      font-family:var(--font-heading);
    }

    .subtitle{
      text-align:center;
      color:var(--text-dim);
      margin-bottom:30px;
    }

    .tabs{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .tab{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--text-dim);
      font-size:0.85rem;
      cursor:pointer;
      transition:0.3s ease;
    }

    .tab:hover{
      color:var(--text);
      box-shadow:var(--glow);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:18px;
      overflow:hidden;
      transition:0.35s ease;
      text-decoration:none;
      color:var(--text);
      backdrop-filter:blur(12px);
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:var(--glow-strong);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      background:#111;
      position:relative;
    }

    .thumb iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .content{
      padding:15px;
    }

    .content h3{
      margin:0 0 5px 0;
      font-family:var(--font-heading);
    }

    .content p{
      color:var(--text-dim);
      font-size:0.9rem;
    }

    footer{
      text-align:center;
      margin-top:70px;
      color:var(--text-dim);
      font-size:0.85rem;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="nav">
      <a href="visuals.html">← Back to Visuals</a>
    </div>

    <h1>MUSIC VIDEOS</h1>
    <p class="subtitle">Cinematic releases and visual transmissions</p>

    <div class="tabs">
      <div class="tab">All</div>
      <div class="tab">Releases</div>
      <div class="tab">Live</div>
    </div>

    <div class="grid" id="videoGrid"></div>

    <footer>THE GREI SHOW • Visual Universe • Wheel It! Records 💿</footer>

  </div>

  <script src="assets/js/media-engine.js"></script>

  <script>
    const grid = document.getElementById("videoGrid");

    function render(){
      const videos = MediaEngine.getAll('videos');

      grid.innerHTML = videos.map(v => `
        <div class="card">
          <div class="thumb">
            <iframe 
              src="https://www.youtube.com/embed/${v.id}?autoplay=0&mute=1&rel=0"
              allowfullscreen>
            </iframe>
          </div>
          <div class="content">
            <h3>${v.title}</h3>
            <p>${v.artist}</p>
          </div>
        </div>
      `).join('');
    }

    render();
  </script>

</body>
</html>
