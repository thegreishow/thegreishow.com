<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grei Show Arcade</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    :root {
      --arcade-bg: #07090d;
      --arcade-panel: #101722;
      --arcade-panel-2: #131d2b;
      --arcade-line: rgba(255,255,255,0.1);
      --arcade-text: #ffffff;
      --arcade-muted: rgba(255,255,255,0.68);
      --arcade-blue: #1f6feb;
      --arcade-cyan: #00c8ff;
      --arcade-gold: #d7b957;
      --arcade-green: #4ade80;
    }

    * { box-sizing: border-box; }

    body {
      color: var(--arcade-text);
    }

    #arcade-root {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .arcade-shell {
      display: grid;
      gap: 22px;
    }

    .arcade-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: end;
      padding: 28px;
      border: 1px solid var(--arcade-line);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,255,255,0.075), rgba(255,255,255,0.025));
      box-shadow: 0 22px 70px rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
    }

    .arcade-kicker {
      margin: 0 0 10px;
      color: var(--arcade-gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .arcade-hero h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .arcade-hero p {
      max-width: 680px;
      margin: 16px 0 0;
      color: var(--arcade-muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .arcade-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
      min-width: 240px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--arcade-line);
      border-radius: 8px;
      background: rgba(0,0,0,0.18);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--arcade-muted);
      font-size: 12px;
    }

    .arcade-controls {
      display: grid;
      grid-template-columns: minmax(220px, 360px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .arcade-search {
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--arcade-line);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: var(--arcade-text);
      outline: none;
    }

    .arcade-search:focus {
      border-color: rgba(0,200,255,0.65);
      box-shadow: 0 0 0 3px rgba(0,200,255,0.12);
    }

    .arcade-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filter {
      min-height: 42px;
      border: 1px solid var(--arcade-line);
      color: rgba(255,255,255,0.78);
      padding: 0 12px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.04);
    }

    .filter:hover,
    .filter.active {
      background: var(--arcade-blue);
      border-color: var(--arcade-blue);
      color: #fff;
    }

    .arcade-status {
      color: var(--arcade-muted);
      font-size: 13px;
      min-height: 20px;
    }

    .arcade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .arcade-card {
      min-height: 100%;
      background: linear-gradient(180deg, var(--arcade-panel), var(--arcade-panel-2));
      border: 1px solid var(--arcade-line);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .arcade-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,200,255,0.42);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
    }

    .arcade-card-inner {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .arcade-thumb {
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #0b0f14;
      border-bottom: 1px solid var(--arcade-line);
    }

    .arcade-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .arcade-info {
      padding: 14px;
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .arcade-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--arcade-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .arcade-info h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .arcade-info p {
      margin: 0;
      color: var(--arcade-muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .arcade-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 7px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: rgba(255,255,255,0.76);
      background: rgba(255,255,255,0.04);
    }

    .play-btn {
      width: calc(100% - 28px);
      margin: 0 14px 14px;
      min-height: 42px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--arcade-blue), #39a6ff);
      color: white;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .play-btn:hover {
      filter: brightness(1.08);
    }

    .arcade-empty {
      padding: 28px;
      border: 1px dashed rgba(255,255,255,0.18);
      border-radius: 8px;
      color: var(--arcade-muted);
      text-align: center;
      background: rgba(255,255,255,0.035);
    }

    .arcade-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .arcade-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.76);
      backdrop-filter: blur(12px);
    }

    .arcade-modal-content {
      position: relative;
      width: min(1120px, 100%);
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      overflow: hidden;
      background: #05070a;
      box-shadow: 0 30px 100px rgba(0,0,0,0.55);
    }

    .arcade-iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      cursor: pointer;
      background: rgba(0,0,0,0.64);
      color: #fff;
      font-size: 22px;
      line-height: 1;
    }

    @media (max-width: 760px) {
      #arcade-root { width: min(100% - 24px, 1180px); padding-top: 26px; }
      .arcade-hero { grid-template-columns: 1fr; padding: 20px; }
      .arcade-stats { min-width: 0; }
      .arcade-controls { grid-template-columns: 1fr; }
      .arcade-filters { justify-content: flex-start; }
      .arcade-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <!-- GLOBAL NAV INJECTOR -->
  <div id="site-header"></div>
  <script src="shared/nav.js"></script>

  <div id="arcade-root" aria-live="polite"></div>

  <script type="module" src="arcade/engine/loader.js"></script>
</body>
</html>
