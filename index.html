<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Portal</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .portal {
      width: 100%;
      max-width: 1100px;
      padding: 2rem;
    }

    .title {
      text-align: center;
      font-size: clamp(3rem, 6vw, 5rem);
      margin-bottom: 3rem;
      letter-spacing: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--bg-light);
      padding: 2rem;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      color: var(--primary);
      transition: transform 0.2s ease, background 0.2s ease;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-5px);
      background: #1a1a28;
    }

    .emoji {
      font-size: 2rem;
      margin-bottom: 1rem;
      display: block;
    }
  </style>
</head>

<body>

  <div class="portal">
    <h1 class="title">THE GREI SHOW</h1>

    <div class="grid">
      <a class="card" href="music.html">
        <span class="emoji">🎵</span>
        MUSIC
      </a>

      <a class="card" href="visuals.html">
        <span class="emoji">📺</span>
        VISUALS
      </a>

      <a class="card" href="arcade.html">
        <span class="emoji">🎮</span>
        ARCADE
      </a>

      <a class="card" href="wheelit.html">
        <span class="emoji">🌿</span>
        WHEEL IT
      </a>

      <a class="card" href="astralthread.html">
        <span class="emoji">📚</span>
        ASTRAL THREAD
      </a>

      <a class="card" href="connect.html">
        <span class="emoji">📬</span>
        CONNECT
      </a>

      <a class="card" href="epk.html">
        <span class="emoji">📄</span>
        EPK
      </a>
    </div>
  </div>

</body>
</html>
