<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Payment Received — White Line Entertainment</title>
  <style>
    :root{color-scheme:dark;--bg:#03060c;--panel:#0a1320;--line:rgba(255,255,255,.12);--text:#f5f7fb;--muted:#9eabba;--accent:#d8ff63}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,sans-serif}.card{width:min(620px,100%);padding:34px;border:1px solid var(--line);border-radius:24px;background:var(--panel);text-align:center}.mark{width:74px;height:74px;display:grid;place-items:center;margin:0 auto 20px;border-radius:50%;background:var(--accent);color:#071018;font-size:2rem;font-weight:900}h1{margin:0 0 10px;font-size:clamp(2rem,7vw,3.8rem);letter-spacing:-.05em}.muted{color:var(--muted)}a{display:inline-flex;margin-top:18px;padding:11px 17px;border-radius:999px;background:var(--accent);color:#071018;text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <p class="muted">WHITE LINE ENTERTAINMENT</p>
    <h1>Payment received</h1>
    <p>Your secure Stripe checkout has been completed. White Line will confirm the booking details and remaining balance with you directly.</p>
    <p class="muted">Keep your Stripe receipt for your records.</p>
    <a href="whiteline.html">Return to White Line</a>
  </main>
</body>
</html>
