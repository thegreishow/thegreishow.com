<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grei Show | Artist Showcase</title>

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(140,80,255,0.14), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.10), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%);
      pointer-events:none;
      animation:drift 16s ease-in-out infinite alternate;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.08)}
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:70px 20px;
      position:relative;
      z-index:2;
    }

    .back a{
      color:var(--text-dim);
      text-decoration:none;
      transition:0.3s;
    }

    .back a:hover{
      color:var(--accent);
    }

    .hero{
      text-align:center;
      margin-bottom:25px;
    }

    .hero h1{
      font-size:3.6rem;
      letter-spacing:4px;
      margin:10px 0;
      text-shadow:var(--glow-strong);
      font-family:var(--font-heading);
    }

    .hero p{
      color:var(--text-dim);
      max-width:650px;
      margin:0 auto;
    }

    .artist-block{
      text-align:center;
      margin:40px 0;
      padding:25px;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(10px);
    }

    .artist-name{
      font-size:1.8rem;
      margin-bottom:5px;
    }

    .tagline{
      color:var(--text-dim);
      font-size:0.9rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      overflow:hidden;
      backdrop-filter:blur(12px);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:var(--glow-strong);
    }

    iframe{
      width:100%;
      aspect-ratio:16/9;
      border:none;
    }

    .content{
      padding:15px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="back"><a href="visuals.html">← Back</a></div>

  <div class="hero">
    <h1>The Grei Show</h1>
    <p>Artist showcase portal — visuals, releases, and creative identity archive</p>
  </div>

  <div class="artist-block">
    <div class="artist-name">The Grei Show</div>
    <div class="tagline">Independent artist | Jamaica | Visual + Music Universe</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script src="assets/js/media-engine.js"></script>

<script>
  const grid = document.getElementById('grid');

  function render(){
    const videos = MediaEngine.getAll('videos') || [];

    grid.innerHTML = videos.map(v => `
      <div class="card">
        <iframe src="https://www.youtube.com/embed/${v.id}?rel=0"></iframe>
        <div class="content">
          <h3>${v.title}</h3>
          <p>${v.artist}</p>
        </div>
      </div>
    `).join('');
  }

  render();
</script>

</body>
</html>
