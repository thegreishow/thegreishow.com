<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Portal</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    body {
      margin: 0;
      background: radial-gradient(circle at top, #151525, #07070b 70%);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(120,80,255,0.15), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(0,200,255,0.08), transparent 60%);
      pointer-events: none;
      animation: drift 12s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes drift {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .portal {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
    }

    .hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      letter-spacing: 6px;
      text-shadow: var(--glow-strong);
      margin-bottom: 10px;
    }

    .hero p {
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    /* Featured Music Card */
    .featured {
      background: linear-gradient(135deg, rgba(138,125,255,0.15), rgba(0,200,255,0.08));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-xl);
      padding: 30px;
      margin-bottom: 40px;
      text-align: center;
      box-shadow: var(--glow);
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease;
    }

    .featured:hover {
      transform: scale(1.02);
      box-shadow: var(--glow-strong);
    }

    .featured h2 {
      font-family: var(--font-heading);
      margin-bottom: 10px;
    }

    .featured a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      text-decoration: none;
    }

    .featured a:hover {
      background: rgba(255,255,255,0.15);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      text-align: center;
      border-radius: var(--radius-lg);
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--glow);
    }

    .emoji {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="portal">

    <!-- HERO -->
    <div class="hero">
      <h1>THE GREI SHOW</h1>
      <p>ENTER THE CREATIVE UNIVERSE</p>
    </div>

    <!-- FEATURED MUSIC -->
    <div class="featured">
      <h2>The Grei Show - No Drama</h2>
      <p>Featured Release</p>
      <a href="music.html">Enter Music World</a>
    </div>

    <!-- PORTAL GRID -->
    <div class="grid">

      <a class="card" href="music.html">
        <span class="emoji">🎵</span>
        MUSIC
      </a>

      <a class="card" href="visuals.html">
        <span class="emoji">📺</span>
        VISUALS
      </a>

      <a class="card" href="photography.html">
        <span class="emoji">📷</span>
        PHOTOGRAPHY
      </a>

      <a class="card" href="about.html">
        <span class="emoji">👤</span>
        ABOUT
      </a>

      <a class="card" href="arcade.html">
        <span class="emoji">🎮</span>
        ARCADE
      </a>

      <a class="card" href="wheelit.html">
        <span class="emoji">💿</span>
        WHEEL IT! RECORDS
      </a>

      <a class="card" href="merch.html">
        <span class="emoji">🛍️</span>
        MERCH
      </a>

      <a class="card" href="astralthread.html">
        <span class="emoji">📚</span>
        ASTRAL THREAD
      </a>

      <a class="card" href="connect.html">
        <span class="emoji">📬</span>
        CONNECT
      </a>

    </div>
  </div>

  <!-- BACKGROUND MUSIC -->
  <audio id="bg-music" src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" loop></audio>

  <script>
    const audio = document.getElementById('bg-music');

    window.addEventListener('load', () => {
      audio.volume = 0.25;
      audio.play().catch(() => {});
    });

    document.addEventListener('click', () => {
      if (audio.paused) audio.play();
    }, { once: true });
  </script>

</body>
</html>
