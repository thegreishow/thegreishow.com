<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
    }

    .wrap{
      max-width:1000px;
      margin:0 auto;
      padding:60px 20px;
    }

    h1{
      text-align:center;
      font-size:2.8rem;
      letter-spacing:2px;
      margin-bottom:10px;
      text-shadow: var(--glow);
    }

    p.subtitle{
      text-align:center;
      color: var(--text-dim);
      margin-bottom:40px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;
    }

    .gallery img{
      width:100%;
      border-radius:14px;
      object-fit:cover;
      transition:transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .gallery img:hover{
      transform:scale(1.03);
      box-shadow: var(--glow);
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:var(--text-dim);
      font-size:0.9rem;
    }
  </style>
</head>

<body>

  <!-- GLOBAL NAV -->
  <div id="site-header"></div>
  <script src="/shared/nav.js"></script>

  <div class="wrap">
    <h1>PHOTOGRAPHY</h1>
    <p class="subtitle">Real Stories. Real People. Real Places.</p>

    <div class="gallery">
      <img src="http://thegreishow.xo.je/photos/jamaica1.jpg" alt="Jamaica" loading="lazy">
      <img src="http://thegreishow.xo.je/photos/jamaica2.jpg" alt="Jamaica" loading="lazy">
      <img src="http://thegreishow.xo.je/photos/jamaica3.jpg" alt="Jamaica" loading="lazy">
      <img src="http://thegreishow.xo.je/photos/jamaica4.jpg" alt="Jamaica" loading="lazy">
      <img src="http://thegreishow.xo.je/photos/jamaica5.jpg" alt="Jamaica" loading="lazy">
    </div>

    <footer>
      © The Grei Show | Wheel It! Records 💿
    </footer>
  </div>

</body>
</html>
