<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Kingston Dash | The Grei Show Arcade</title><style>*{box-sizing:border-box}html,body{margin:0;background:#07110d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overscroll-behavior:none}body{min-height:100vh}.wrap{width:min(1100px,100%);margin:auto;padding:10px;display:grid;gap:10px}.hud{display:flex;justify-content:space-between;gap:8px;align-items:center}.title h1{margin:0;font-size:clamp(1.8rem,7vw,4rem);line-height:.9}.title p{margin:7px 0 0;color:#a8b3ad;font-size:12px}.stats{display:flex;gap:6px}.stat{min-width:68px;padding:8px;border:1px solid #294137;border-radius:12px;background:#0d1914;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:9px;color:#91a49b;text-transform:uppercase}.stage{position:relative;min-height:58vh;border:1px solid #294137;border-radius:16px;overflow:hidden;background:#8fd3ff}.stage canvas{display:block;width:100%;height:100%;min-height:58vh;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:20px;background:rgba(1,8,5,.76)}.overlay[hidden]{display:none}.panel{max-width:570px;padding:28px;border:1px solid rgba(255,255,255,.17);border-radius:18px;background:rgba(6,18,12,.94);text-align:center}.panel h2{margin:0;font-size:clamp(2.3rem,10vw,5rem);line-height:.9}.panel p{color:#b8c6bf;line-height:1.55}.btn{min-height:50px;padding:0 22px;border:0;border-radius:999px;background:linear-gradient(135deg,#f6c445,#ff7b32);font-weight:900;color:#111}.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px}.controls button{min-height:76px;border:1px solid #294137;border-radius:16px;background:#102119;color:#fff;font-size:24px;font-weight:900;touch-action:none}.hint{text-align:center;color:#91a49b;font-size:11px}@media(max-width:600px){.title p{display:none}.stat{min-width:58px}.stage,.stage canvas{min-height:55vh}.controls button{min-height:82px}}@media(orientation:landscape) and (max-height:650px){.wrap{grid-template-columns:1fr 200px;grid-template-areas:'hud hud' 'stage controls';height:calc(100vh - 62px)}.hud{grid-area:hud}.stage{grid-area:stage;min-height:0}.stage canvas{height:100%;min-height:0}.controls{grid-area:controls;grid-template-columns:1fr;align-content:center}.hint{display:none}}</style></head><body><script src="../../engine/game-shell.js"></script><main class="wrap"><header class="hud"><div class="title"><h1>Kingston Dash</h1><p>Run the city. Jump barriers. Double-jump the impossible.</p></div><div class="stats"><div class="stat"><b id="score">0</b><span>Score</span></div><div class="stat"><b id="distance">0</b><span>Metres</span></div><div class="stat"><b id="best">0</b><span>Best</span></div></div></header><section class="stage"><canvas id="game" width="960" height="540"></canvas><div class="overlay" id="overlay"><div class="panel"><h2 id="headline">KINGSTON DASH</h2><p id="message">Tap Jump to clear roadblocks. Tap Double Jump while airborne for a second boost.</p><button class="btn" id="start">Start Running</button></div></div></section><section class="controls"><button id="jump">⬆ Jump</button><button id="double">⚡ Double Jump</button></section><div class="hint">Keyboard: Space / ↑ to jump · X for double jump · P pauses</div></main><script>(()=>{const API='https://grei-arcade-api.thegreishow.workers.dev',GAME='kingston-dash',c=document.getElementById('game'),ctx=c.getContext('2d'),overlay=document.getElementById('overlay'),headline=document.getElementById('headline'),message=document.getElementById('message'),scoreEl=document.getElementById('score'),distanceEl=document.getElementById('distance'),bestEl=document.getElementById('best');let running=false,paused=false,last=0,startTime=0,score=0,distance=0,speed=340,spawn=0,obstacles=[],particles=[],best=Number(localStorage.getItem('grei-kingston-dash-best')||0);const ground=445,player={x:130,y:ground-74,w:50,h:74,vy:0,jumps:0};bestEl.textContent=best;function reset(){score=0;distance=0;speed=340;spawn=.8;obstacles=[];particles=[];player.y=ground-player.h;player.vy=0;player.jumps=0;hud()}function hud(){scoreEl.textContent=Math.floor(score);distanceEl.textContent=Math.floor(distance);bestEl.textContent=best}function jump(){if(!running||paused)return;if(player.jumps<1){player.vy=-640;player.jumps=1}}function doubleJump(){if(!running||paused)return;if(player.jumps===1){player.vy=-560;player.jumps=2}}function addObstacle(){const type=Math.random()<.25?'high':'low';obstacles.push({x:c.width+40,w:type==='high'?42:54,h:type==='high'?105:55,type})}function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function drawRunner(){const run=Math.sin(distance*.08),x=player.x,y=player.y;ctx.save();ctx.translate(x+25,y+30);ctx.strokeStyle='#6b3b22';ctx.lineWidth=11;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-3,20);ctx.lineTo(-18,55+run*7);ctx.moveTo(6,20);ctx.lineTo(28,48-run*7);ctx.stroke();ctx.fillStyle='#e8432f';ctx.fillRect(-19,-8,42,42);ctx.fillStyle='#2fbf71';ctx.fillRect(-19,23,42,15);ctx.strokeStyle='#6b3b22';ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-36,28-run*4);ctx.moveTo(17,3);ctx.lineTo(38,-14+run*4);ctx.stroke();ctx.fillStyle='#6b3b22';ctx.beginPath();ctx.arc(3,-24,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(-7,-41,28,8);ctx.restore()}function draw(){const sky=ctx.createLinearGradient(0,0,0,c.height);sky.addColorStop(0,'#86d7ff');sky.addColorStop(.65,'#d8f0d0');sky.addColorStop(1,'#4b7a4e');ctx.fillStyle=sky;ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.8)';for(let i=0;i<5;i++){const x=(i*240-distance*.15)%1200-100;ctx.beginPath();ctx.arc(x,90+i%2*35,32,0,Math.PI*2);ctx.arc(x+35,85+i%2*35,25,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#24372d';for(let i=0;i<12;i++){const x=(i*100-distance*.35)%1200;ctx.fillRect(x,270-(i%3)*25,74,175+(i%3)*25);ctx.fillStyle='#f6c445';ctx.fillRect(x+14,295,8,8);ctx.fillRect(x+42,330,8,8);ctx.fillStyle='#24372d'}ctx.fillStyle='#252525';ctx.fillRect(0,ground,c.width,c.height-ground);ctx.strokeStyle='#f6c445';ctx.lineWidth=7;ctx.setLineDash([48,34]);ctx.beginPath();ctx.moveTo(0,ground+47);ctx.lineTo(c.width,ground+47);ctx.stroke();ctx.setLineDash([]);for(const o of obstacles){ctx.fillStyle=o.type==='high'?'#db4d3f':'#f6c445';ctx.fillRect(o.x,ground-o.h,o.w,o.h);ctx.fillStyle='#111';ctx.fillRect(o.x+7,ground-o.h+12,o.w-14,10)}drawRunner()}function update(dt){player.vy+=1700*dt;player.y+=player.vy*dt;if(player.y>=ground-player.h){player.y=ground-player.h;player.vy=0;player.jumps=0}distance+=speed*dt/10;score+=speed*dt/24;speed+=4*dt;spawn-=dt;if(spawn<=0){addObstacle();spawn=Math.max(.55,1.25-score/1800)+Math.random()*.45}for(const o of obstacles)o.x-=speed*dt;for(const o of obstacles){if(hit(player,{x:o.x,y:ground-o.h,w:o.w,h:o.h})){end();return}}obstacles=obstacles.filter(o=>o.x+o.w>-30);hud()}function loop(t){if(!running||paused)return;const dt=Math.min((t-last)/1000,.033);last=t;update(dt);draw();if(running&&!paused)requestAnimationFrame(loop)}function begin(){reset();running=true;paused=false;startTime=Date.now();last=performance.now();overlay.hidden=true;requestAnimationFrame(loop)}async function submit(){const name=localStorage.getItem('grei_arcade_player_name')||'Dreamer',duration=Math.max(1,Math.round((Date.now()-startTime)/1000));try{const r=await fetch(API+'/api/leaderboard',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAME,name,score:Math.floor(score),level:Math.max(1,Math.floor(distance/1000)+1),duration})});const data=await r.json();if(!r.ok)throw new Error(data.error||'Sync failed');message.textContent=`Score ${Math.floor(score)} saved globally. Rank #${data.rank}.`; }catch(err){message.textContent=`Score ${Math.floor(score)} saved locally. ${err.message||'Global sync unavailable.'}`}}function end(){running=false;best=Math.max(best,Math.floor(score));localStorage.setItem('grei-kingston-dash-best',best);hud();headline.textContent='RUN ENDED';message.textContent='Submitting your score…';document.getElementById('start').textContent='Run Again';overlay.hidden=false;submit()}document.getElementById('start').onclick=begin;document.getElementById('jump').onclick=jump;document.getElementById('double').onclick=double;addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump()}if(e.code==='KeyX')doubleJump()});c.addEventListener('pointerdown',()=>player.jumps?doubleJump():jump());addEventListener('grei:pause',e=>{paused=e.detail.paused;if(!paused&&running){last=performance.now();requestAnimationFrame(loop)}});draw()})();</script></body></html>
