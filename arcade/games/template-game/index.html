<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template Game | The Grei Show Arcade</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #172033, #07090d 72%);
      color: #fff;
    }

    main {
      width: min(680px, calc(100% - 32px));
      text-align: center;
      padding: 36px 24px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 12px;
      letter-spacing: 2px;
    }

    p {
      margin: 0;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Template Game</h1>
    <p>This placeholder confirms the arcade loader, registry, and navigation paths are connected.</p>
  </main>

</html>
