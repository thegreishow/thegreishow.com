name: Deploy Arcade API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/arcade-api/**'
      - '.github/workflows/deploy-arcade-api.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/arcade-api

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      ARCADE_API_URL: https://grei-arcade-api.thegreishow.workers.dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID D1_DATABASE_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing from GitHub repository secrets."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm install

      - name: Verify Cloudflare authentication
        run: npx wrangler whoami

      - name: Generate production Wrangler config
        shell: bash
        run: |
          cat > wrangler.toml <<EOF
          name = "grei-arcade-api"
          main = "src/index.js"
          compatibility_date = "2026-07-01"
          workers_dev = true

          [vars]
          ALLOWED_ORIGINS = "https://thegreishow.com,https://www.thegreishow.com"
          OPENAI_MODEL = "gpt-5-mini"

          [[d1_databases]]
          binding = "ARCADE_DB"
          database_name = "grei-arcade"
          database_id = "$D1_DATABASE_ID"
          EOF

      - name: Initialize remote database
        run: npx wrangler d1 execute grei-arcade --remote --file=./schema.sql

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Verify Worker health
        working-directory: .
        run: |
          sleep 10
          HEALTH="$(curl --fail --show-error --retry 5 --retry-delay 5 "$ARCADE_API_URL/api/health")"
          echo "$HEALTH"
          node -e 'const h=JSON.parse(process.argv[1]); if(!h.ok || h.database!=="connected" || h.leaderboard!==true || h.crossDeviceProfiles!==true) process.exit(1)' "$HEALTH"

      - name: Prove cross-device account round-trip
        shell: bash
        run: |
          PIN="$(printf '%06d' $((RANDOM % 1000000)))"
          CREATE="$(curl --fail --show-error "$ARCADE_API_URL/api/profile" \
            -H 'Content-Type: application/json' \
            --data "{\"action\":\"create\",\"name\":\"CI Proof\",\"avatar\":\"⚡\",\"pin\":\"$PIN\"}")"
          CODE="$(node -e 'const d=JSON.parse(process.argv[1]); if(!d.ok||!d.player?.playerCode)process.exit(1); process.stdout.write(d.player.playerCode)' "$CREATE")"
          LOGIN="$(curl --fail --show-error "$ARCADE_API_URL/api/profile" \
            -H 'Content-Type: application/json' \
            --data "{\"action\":\"login\",\"playerCode\":\"$CODE\",\"pin\":\"$PIN\"}")"
          node -e 'const d=JSON.parse(process.argv[1]); if(!d.ok||d.player?.name!=="CI Proof"||d.player?.playerCode!==process.argv[2])process.exit(1)' "$LOGIN" "$CODE"
          echo "Cross-device proof passed for $CODE"
          npx wrangler d1 execute grei-arcade --remote --command="DELETE FROM players WHERE player_code = '$CODE'"
