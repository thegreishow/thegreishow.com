<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentaries | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 25% 20%, rgba(140,80,255,0.18), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%);
      pointer-events:none;
      animation:drift 14s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.12)}
    }

    .wrap{
      position:relative;
      z-index:2;
      max-width:1150px;
      margin:0 auto;
      padding:70px 20px;
    }

    .nav a{
      color:var(--text-dim);
      text-decoration:none;
      font-weight:600;
    }

    .nav a:hover{color:var(--accent)}

    h1{
      text-align:center;
      font-size:clamp(2.8rem,5vw,4.2rem);
      letter-spacing:6px;
      text-shadow:var(--glow-strong);
      margin-bottom:10px;
      font-family:var(--font-heading);
    }

    .subtitle{
      text-align:center;
      color:var(--text-dim);
      margin-bottom:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:18px;
      padding:22px;
      backdrop-filter:blur(12px);
      transition:0.35s ease;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:var(--glow-strong);
    }

    .card h3{
      margin:0 0 6px 0;
      font-family:var(--font-heading);
    }

    .card p{
      color:var(--text-dim);
      font-size:0.9rem;
    }

    footer{
      text-align:center;
      margin-top:70px;
      color:var(--text-dim);
      font-size:0.85rem;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="nav">
      <a href="visuals.html">← Back to Visuals</a>
    </div>

    <h1>DOCUMENTARIES</h1>
    <p class="subtitle">Story-driven visual archives and behind-the-scenes transmissions</p>

    <div id="docGrid" class="grid"></div>

    <footer>THE GREI SHOW • Visual Universe • Wheel It! Records 💿</footer>

  </div>

  <script>
    const documentaries = [
      {
        title: "Behind The Grei Show",
        description: "Creative process and studio life (coming soon)",
        type: "archive"
      }
    ];

    const grid = document.getElementById("docGrid");

    function render(){
      grid.innerHTML = documentaries.map(d => `
        <div class="card">
          <h3>${d.title}</h3>
          <p>${d.description}</p>
        </div>
      `).join('');
    }

    render();
  </script>

</body>
</html>
