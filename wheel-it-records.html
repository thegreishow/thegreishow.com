<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel It! Records 💿 | Producer Showcase</title>

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(140,80,255,0.14), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.10), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%);
      pointer-events:none;
      animation:drift 16s ease-in-out infinite alternate;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.08)}
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:70px 20px;
      position:relative;
      z-index:2;
    }

    .back a{
      color:var(--text-dim);
      text-decoration:none;
      transition:0.3s;
    }

    .back a:hover{
      color:var(--accent);
    }

    .hero{
      text-align:center;
      margin-bottom:20px;
    }

    .hero h1{
      font-size:3.6rem;
      letter-spacing:4px;
      margin:10px 0;
      text-shadow:var(--glow-strong);
      font-family:var(--font-heading);
    }

    .hero p{
      color:var(--text-dim);
      max-width:700px;
      margin:0 auto;
    }

    .intro{
      text-align:center;
      margin:30px auto 50px;
      max-width:800px;
      padding:20px;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(10px);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      overflow:hidden;
      backdrop-filter:blur(12px);
      transition:0.3s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:var(--glow-strong);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      background-size:cover;
      background-position:center;
    }

    .content{
      padding:14px;
    }

    .meta{
      font-size:0.8rem;
      opacity:0.75;
      margin-top:5px;
    }

    .role{
      display:inline-block;
      margin-top:8px;
      font-size:0.75rem;
      padding:4px 8px;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:999px;
      opacity:0.8;
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="back"><a href="index.html">← Home</a></div>

  <div class="hero">
    <h1>Wheel It! Records 💿</h1>
    <p>Producer showcase portal — credits, collaborations, and music production archive</p>
  </div>

  <div class="intro">
    Wheel It! Records is a production identity focused on music creation, collaboration, and sonic development across artists.
  </div>

  <div class="grid" id="grid"></div>

</div>

<script src="assets/js/media-engine.js"></script>

<script>
  const grid = document.getElementById('grid');

  function thumb(id){
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  }

  function render(){
    const videos = MediaEngine.getAll('videos') || [];

    grid.innerHTML = videos.map(v => `
      <div class="card">
        <div class="thumb" style="background-image:url('${thumb(v.id)}')"></div>
        <div class="content">
          <h3>${v.title}</h3>
          <div class="meta">Artist: ${v.artist || 'Unknown'}</div>
          <div class="role">Produced / Developed by Wheel It! Records</div>
        </div>
      </div>
    `).join('');
  }

  render();
</script>

</body>
</html>
