<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    .wrap{
      position:relative;
      z-index:1;
      max-width:1000px;
      margin:0 auto;
      padding:70px 20px;
    }

    h1{
      text-align:center;
      font-size:3.4rem;
      line-height:1;
      letter-spacing:0;
      margin:0 0 12px;
      text-shadow: var(--glow);
    }

    p.subtitle{
      max-width:680px;
      margin:0 auto 40px;
      text-align:center;
      color: var(--text-dim);
      line-height:1.7;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:15px;
    }

    .gallery img{
      width:100%;
      aspect-ratio:4/3;
      border-radius:8px;
      object-fit:cover;
      transition:transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: var(--shadow-sm);
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04);
    }

    .gallery img:hover{
      transform:scale(1.03);
      box-shadow: var(--glow);
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:var(--text-dim);
      font-size:0.9rem;
    }
  </style>
</head>

<body>

  <div id="site-header"></div>
  <script src="shared/nav.js"></script>

  <main class="wrap">
    <p class="eyebrow" style="text-align:center;">Visual Archive</p>
    <h1>Photography</h1>
    <p class="subtitle">Real stories, people, places, and fragments from the world surrounding the music.</p>

    <div class="gallery">
      <img src="https://thegreishow.xo.je/photos/jamaica1.jpg" alt="Jamaica street photography" loading="lazy">
      <img src="https://thegreishow.xo.je/photos/jamaica2.jpg" alt="Jamaica landscape photography" loading="lazy">
      <img src="https://thegreishow.xo.je/photos/jamaica3.jpg" alt="Jamaica documentary photography" loading="lazy">
      <img src="https://thegreishow.xo.je/photos/jamaica4.jpg" alt="Jamaica visual archive" loading="lazy">
      <img src="https://thegreishow.xo.je/photos/jamaica5.jpg" alt="Jamaica creative photography" loading="lazy">
    </div>

    <footer>The Grei Show - Wheel It! Records</footer>
  </main>

</body>
</html>
