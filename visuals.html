<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visuals | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x:hidden;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:60px 20px;
    }

    .nav a{
      color: var(--text-dim);
      text-decoration:none;
      font-weight:600;
    }

    .nav a:hover{
      color: var(--accent);
    }

    h1{
      text-align:center;
      font-size:clamp(2.5rem,5vw,4rem);
      letter-spacing:4px;
      text-shadow: var(--glow);
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color: var(--text-dim);
      letter-spacing:1px;
      margin-bottom:40px;
    }

    .hero-video{
      width:100%;
      aspect-ratio:16/9;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
      box-shadow: var(--glow);
      margin-bottom:40px;
    }

    .hero-video iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }

    .card{
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(10px);
      transition: 0.3s ease;
      text-decoration:none;
      color:var(--text);
    }

    .card:hover{
      transform: translateY(-6px);
      box-shadow: var(--glow-strong);
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:var(--text-dim);
      font-size:0.85rem;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="nav">
      <a href="index.html">← Portal</a>
    </div>

    <h1>VISUALS</h1>
    <p class="subtitle">Cinematic worlds, performances, and creative transmissions</p>

    <div class="hero-video">
      <iframe 
        src="https://www.youtube.com/embed/ZsoVettmghI?autoplay=1&mute=1&playsinline=1&rel=0&list=PLHkIb6ZjlTbNLiBOk5GFii1iw2zU8PZlQ"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>

    <div class="grid">
      <a class="card" href="music-videos.html">
        <h3>Music Videos</h3>
        <p>Official releases and visual storytelling</p>
      </a>

      <a class="card" href="documentaries.html">
        <h3>Documentaries</h3>
        <p>Behind the scenes & creative process</p>
      </a>

      <a class="card" href="live-sessions.html">
        <h3>Live Sessions</h3>
        <p>Performance and studio recordings</p>
      </a>
    </div>

    <footer>THE GREI SHOW © 2026 • Wheel It! Records 💿</footer>

  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>

</body>
</html>
