name: Deploy Arcade API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/arcade-api/**'
      - '.github/workflows/deploy-arcade-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/arcade-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/arcade-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate production Wrangler config
        env:
          D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          test -n "$D1_DATABASE_ID"
          cat > wrangler.toml <<EOF
          name = "grei-arcade-api"
          main = "src/index.js"
          compatibility_date = "2026-07-01"
          workers_dev = true

          routes = [
            { pattern = "thegreishow.com/api/*", zone_name = "thegreishow.com" },
            { pattern = "www.thegreishow.com/api/*", zone_name = "thegreishow.com" }
          ]

          [vars]
          ALLOWED_ORIGINS = "https://thegreishow.com,https://www.thegreishow.com"
          OPENAI_MODEL = "gpt-5-mini"

          [[d1_databases]]
          binding = "ARCADE_DB"
          database_name = "grei-arcade"
          database_id = "$D1_DATABASE_ID"
          EOF

      - name: Initialize remote database
        run: npx wrangler d1 execute grei-arcade --remote --file=./schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify health endpoint
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 https://thegreishow.com/api/health
