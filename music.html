<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f1a, #07070b 70%);
    }

    .music-wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 2rem 0 3rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 6px;
      text-shadow: 0 0 25px rgba(120,80,255,0.4);
    }

    .player {
      margin-top: 2rem;
      text-align: center;
    }

    .player audio {
      width: 100%;
      max-width: 700px;
    }

    .releases {
      margin-top: 4rem;
    }

    .track-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .track-card:hover {
      transform: translateY(-4px);
    }

    .links {
      margin-top: 4rem;
      text-align: center;
    }

    .links h2 {
      letter-spacing: 3px;
      margin-bottom: 1rem;
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
    }

    .links a {
      display: inline-block;
      padding: 0.9rem 1.3rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.03);
      transition: 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .links a:hover {
      background: rgba(120,80,255,0.25);
      box-shadow: 0 0 25px rgba(120,80,255,0.35);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <header>
    <nav class="container">
      <a href="index.html">← Portal</a>
    </nav>
  </header>

  <main class="section music-wrap">

    <div class="hero">
      <h1 id="music-title" data-reveal>MUSIC</h1>

      <div class="player" data-reveal>
        <audio controls>
          <source src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" type="audio/mpeg">
        </audio>
        <p style="color: var(--text-light);">Latest transmission</p>
      </div>
    </div>

    <div class="releases">
      <h2 data-reveal>RELEASES</h2>
      <div id="music-tracks"></div>
    </div>

    <div class="links" data-reveal>
      <h2>STREAM MUSIC</h2>

      <div class="links-grid">
        <a href="https://open.spotify.com/artist/78LUuzis8k8cGRCalx751k" target="_blank">Spotify</a>
        <a href="https://music.apple.com/jm/artist/the-grei-show/885841733" target="_blank">Apple Music</a>
        <a href="https://soundcloud.com/thegreishow" target="_blank">SoundCloud</a>
        <a href="https://music.youtube.com/@thegreishxw?si=caga_AxUEGLyyT6r" target="_blank">YouTube Music</a>
        <a href="https://tidal.com/artist/47307553/u" target="_blank">TIDAL</a>
        <a href="https://thegreishow.bandcamp.com" target="_blank">Bandcamp</a>
      </div>

    </div>

  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>
</body>
</html>
