<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Content Management | The Grei Show</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .admin-notice {
      position: relative;
      z-index: 1;
      width: min(680px, calc(100% - 32px));
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0 auto;
      padding: 48px 0;
    }

    .admin-card {
      padding: clamp(26px, 6vw, 48px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: rgba(3, 6, 12, 0.86);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .admin-card h1 {
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 7vw, 4rem);
      line-height: 1;
    }

    .admin-card p {
      margin: 0;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .admin-actions a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: #fff;
      background: rgba(255, 255, 255, 0.07);
      font-weight: 800;
    }

    .admin-actions a.primary {
      border-color: transparent;
      color: #06101a;
      background: #d8ff63;
    }
  </style>
</head>
<body>
  <main class="admin-notice">
    <section class="admin-card" aria-labelledby="admin-title">
      <p class="eyebrow">Secure editing</p>
      <h1 id="admin-title">Content management moved to GitHub.</h1>
      <p>This public website never needs an access token. Sign in to GitHub to update the content source through its protected editor and review history.</p>
      <div class="admin-actions">
        <a class="primary" href="https://github.com/thegreishow/thegreishow.com/edit/main/assets/data/cms.json" target="_blank" rel="noopener">Open secure editor</a>
        <a href="index.html">Return home</a>
      </div>
    </section>
  </main>
</body>
</html>
