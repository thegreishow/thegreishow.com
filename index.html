<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Portal</title>

  <meta name="description" content="The Grei Show official portal - music, visuals, arcade, merch and creative universe">
  <meta property="og:title" content="The Grei Show | Portal">
  <meta property="og:description" content="Enter the creative universe of The Grei Show">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(140,80,255,0.18), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.12), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.04), transparent 60%);
      pointer-events:none;
      animation: drift 14s ease-in-out infinite alternate;
      z-index:0;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.15)}
    }

    .portal{
      position:relative;
      z-index:2;
      max-width:1200px;
      margin:0 auto;
      padding:70px 20px;
    }

    /* HERO */
    .hero{
      text-align:center;
      margin-bottom:60px;
      animation: fadeUp 1.2s ease;
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(20px)}
      to{opacity:1; transform:translateY(0)}
    }

    .hero h1{
      font-family:var(--font-heading);
      font-size:clamp(2.8rem,6vw,5rem);
      letter-spacing:8px;
      text-shadow:var(--glow-strong);
      margin-bottom:10px;
    }

    .hero p{
      color:var(--text-dim);
      letter-spacing:3px;
      text-transform:uppercase;
    }

    .cta{
      margin-top:25px;
    }

    .cta a{
      display:inline-block;
      padding:12px 22px;
      border-radius:14px;
      background:linear-gradient(135deg,rgba(140,80,255,0.25),rgba(0,200,255,0.18));
      border:1px solid rgba(255,255,255,0.15);
      color:var(--text);
      text-decoration:none;
      transition:0.3s ease;
      backdrop-filter:blur(10px);
    }

    .cta a:hover{
      transform:scale(1.05);
      box-shadow:var(--glow);
    }

    /* FEATURED */
    .featured{
      background:linear-gradient(135deg,rgba(138,125,255,0.18),rgba(0,200,255,0.10));
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;
      padding:35px;
      margin-bottom:50px;
      text-align:center;
      backdrop-filter:blur(16px);
      box-shadow:var(--glow);
      transition:0.3s ease;
    }

    .featured:hover{
      transform:translateY(-4px);
    }

    .featured h2{
      font-family:var(--font-heading);
      margin-bottom:10px;
      letter-spacing:2px;
    }

    .featured a{
      display:inline-block;
      margin-top:15px;
      padding:10px 18px;
      border-radius:12px;
      background:rgba(255,255,255,0.08);
      color:var(--text);
      text-decoration:none;
      transition:0.3s ease;
    }

    .featured a:hover{
      background:rgba(255,255,255,0.18);
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:20px;
    }

    .card{
      position:relative;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);
      padding:22px;
      text-align:center;
      border-radius:18px;
      text-decoration:none;
      color:var(--text);
      transition:0.35s ease;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
      transform:translateX(-100%);
      transition:0.5s;
    }

    .card:hover::before{
      transform:translateX(100%);
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
      box-shadow:var(--glow-strong);
    }

    .emoji{
      font-size:2rem;
      display:block;
      margin-bottom:10px;
    }

    footer{
      text-align:center;
      margin-top:60px;
      color:var(--text-dim);
      font-size:0.85rem;
    }

  </style>
</head>

<body>

  <div class="portal">

    <div class="hero">
      <h1>THE GREI SHOW</h1>
      <p>ENTER THE CREATIVE UNIVERSE</p>
      <div class="cta">
        <a href="music.html">ENTER PORTAL</a>
      </div>
    </div>

    <div class="featured">
      <h2>The Grei Show - No Drama</h2>
      <p>Featured Release</p>
      <a href="music.html">Listen / Enter Music World</a>
    </div>

    <div class="grid">
      <a class="card" href="music.html"><span class="emoji">🎵</span>MUSIC</a>
      <a class="card" href="visuals.html"><span class="emoji">📺</span>VISUALS</a>
      <a class="card" href="photography.html"><span class="emoji">📷</span>PHOTOGRAPHY</a>
      <a class="card" href="about.html"><span class="emoji">👤</span>ABOUT</a>
      <a class="card" href="arcade.html"><span class="emoji">🎮</span>ARCADE</a>
      <a class="card" href="wheelit.html"><span class="emoji">💿</span>WHEEL IT! RECORDS</a>
      <a class="card" href="merch.html"><span class="emoji">🛍️</span>MERCH</a>
      <a class="card" href="astralthread.html"><span class="emoji">📚</span>ASTRAL THREAD</a>
      <a class="card" href="connect.html"><span class="emoji">📬</span>CONNECT</a>
    </div>

    <footer>THE GREI SHOW © 2026 — ENTER THE UNIVERSE</footer>

  </div>

  <audio id="bg-music" src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" loop></audio>

  <script>
    const audio = document.getElementById('bg-music');
    window.addEventListener('load',()=>{audio.volume=0.25;audio.play().catch(()=>{})});
    document.addEventListener('click',()=>{if(audio.paused)audio.play()},{once:true});
  </script>

</body>
</html>
