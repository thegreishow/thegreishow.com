<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel It! Records 💿 | Producer Reel</title>

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/portal.css" />

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top,#151525,#07070b 70%);
      color:var(--text);
      font-family:var(--font-body);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 20% 20%, rgba(140,80,255,0.14), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(0,200,255,0.10), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.05), transparent 60%);
      pointer-events:none;
      animation:drift 16s ease-in-out infinite alternate;
    }

    @keyframes drift{
      from{transform:scale(1)}
      to{transform:scale(1.08)}
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:70px 20px;
      position:relative;
      z-index:2;
    }

    .back a{
      color:var(--text-dim);
      text-decoration:none;
    }

    .back a:hover{
      color:var(--accent);
    }

    .hero{
      text-align:center;
      margin-bottom:10px;
    }

    .hero h1{
      font-size:3.6rem;
      letter-spacing:4px;
      margin:10px 0;
      text-shadow:var(--glow-strong);
      font-family:var(--font-heading);
    }

    .hero p{
      color:var(--text-dim);
      margin:0 auto;
    }

    .featured{
      margin:35px 0 50px;
    }

    .featured h2{
      font-size:1rem;
      letter-spacing:2px;
      opacity:0.7;
      margin-bottom:15px;
    }

    .featured-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      overflow:hidden;
      backdrop-filter:blur(12px);
      transition:0.3s ease;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:var(--glow-strong);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      background-size:cover;
      background-position:center;
    }

    .content{
      padding:14px;
    }

    .meta{
      font-size:0.85rem;
      opacity:0.8;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:18px;
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="back"><a href="index.html">← Home</a></div>

  <div class="hero">
    <h1>Wheel It! Records 💿</h1>
    <p>Selected music production and collaborations</p>
  </div>

  <div class="featured">
    <h2>FEATURED WORK</h2>
    <div class="featured-grid" id="featured"></div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>
  const works = [
    { title: "Cash Out", artist: "Swnkah", id: "5V5TJFhyEU4" },
    { title: "Ultion", artist: "Hink45", id: "1JVlmntajd0" },
    { title: "Kush & Schweppes", artist: "Blvk H3ro", id: "Gc2dJmPcxOQ" },
    { title: "Weed & Ting", artist: "Protoje", id: "2SEYLu8qSNs" },
    { title: "Soundboii Freestyle", artist: "Fyah Roiall", id: "IhJmti8KkMQ" },
     { title: "Dinero Code", artist: "Wiggward, Poseck Jr.", id: "Dd1zQvb29x4" }
  ];

  function thumb(id){
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
  }

  const featured = document.getElementById('featured');
  const grid = document.getElementById('grid');

  function renderFeatured(){
    featured.innerHTML = works.slice(0,2).map(w => `
      <div class="card">
        <div class="thumb" style="background-image:url('${thumb(w.id)}')"></div>
        <div class="content">
          <div><strong>${w.title}</strong></div>
          <div class="meta">${w.artist}</div>
        </div>
      </div>
    `).join('');
  }

  function renderGrid(){
    grid.innerHTML = works.map(w => `
      <div class="card">
        <div class="thumb" style="background-image:url('${thumb(w.id)}')"></div>
        <div class="content">
          <div><strong>${w.title}</strong></div>
          <div class="meta">${w.artist}</div>
        </div>
      </div>
    `).join('');
  }

  renderFeatured();
  renderGrid();
</script>

</body>
</html>
