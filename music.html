<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music | The Grei Show</title>

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f1a, #07070b 70%);
    }

    .music-wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 2rem 0 3rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 6px;
      text-shadow: 0 0 25px rgba(120,80,255,0.4);
    }

    .featured {
      margin-top: 2rem;
      text-align: center;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
    }

    .featured h2 {
      letter-spacing: 3px;
      margin-bottom: 1rem;
    }

    .featured audio {
      width: 100%;
      max-width: 700px;
    }

    .links {
      margin-top: 4rem;
      text-align: center;
    }

    .links h2 {
      letter-spacing: 3px;
      margin-bottom: 1rem;
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
    }

    .links a {
      display: inline-block;
      padding: 0.9rem 1.3rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.03);
      transition: 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .links a:hover {
      background: rgba(120,80,255,0.25);
      box-shadow: 0 0 25px rgba(120,80,255,0.35);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <header>
    <nav class="container">
      <a href="index.html">← Portal</a>
    </nav>
  </header>

  <main class="section music-wrap">

    <div class="hero">
      <h1 id="music-title" data-reveal>MUSIC</h1>
      <p style="color: var(--text-light); margin-top:1rem;" data-reveal>
        A cinematic audio universe
      </p>
    </div>

    <!-- SINGLE FEATURED PLAYER (CMS DRIVEN) -->
    <div class="featured" data-reveal>
      <h2>FEATURED TRANSMISSION</h2>
      <div id="featured-player"></div>
    </div>

    <!-- STREAM LINKS -->
    <div class="links" data-reveal>
      <h2>STREAM MUSIC</h2>

      <div class="links-grid">
        <a href="https://open.spotify.com/artist/78LUuzis8k8cGRCalx751k" target="_blank">Spotify</a>
        <a href="https://music.apple.com/jm/artist/the-grei-show/885841733" target="_blank">Apple Music</a>
        <a href="https://soundcloud.com/thegreishow" target="_blank">SoundCloud</a>
        <a href="https://music.youtube.com/@thegreishxw?si=caga_AxUEGLyyT6r" target="_blank">YouTube Music</a>
        <a href="https://tidal.com/artist/47307553/u" target="_blank">TIDAL</a>
        <a href="https://thegreishow.bandcamp.com" target="_blank">Bandcamp</a>
      </div>

    </div>

  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/motion.js"></script>

  <script>
    async function loadFeatured() {
      try {
        const res = await fetch('assets/data/cms.json');
        const cms = await res.json();

        const container = document.getElementById('featured-player');
        const track = cms?.music?.featured;

        if (container && track) {
          container.innerHTML = `
            <audio controls autoplay style="width:100%;max-width:700px;">
              <source src="${track.url}" type="audio/mpeg">
            </audio>
            <p style="margin-top:1rem;color:var(--text-light);">
              The Grei Show - No Drama
            </p>
          `;
        }
      } catch (e) {
        console.error('Featured load failed', e);
      }
    }

    loadFeatured();
  </script>

</body>
</html>
