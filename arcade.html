<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grei Show Arcade</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f14;
      color: #ffffff;
    }

    header {
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1f2a36;
      background: #0b0f14;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 14px;
      letter-spacing: 2px;
      margin: 0;
      opacity: 0.9;
    }

    nav a {
      color: #9fb3c8;
      text-decoration: none;
      margin-left: 14px;
      font-size: 13px;
    }

    nav a:hover {
      color: #ffffff;
    }

    #arcade-root {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* GRID */
    .arcade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    /* CARD */
    .arcade-card {
      background: #121a23;
      border: 1px solid #1f2a36;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .arcade-card:hover {
      transform: translateY(-4px);
      border-color: #2d3f55;
    }

    .arcade-thumb img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #0b0f14;
      display: block;
    }

    .arcade-info {
      padding: 12px;
    }

    .arcade-info h3 {
      margin: 0;
      font-size: 15px;
    }

    .arcade-info p {
      font-size: 12px;
      opacity: 0.7;
      margin: 6px 0 10px;
    }

    .arcade-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 6px;
      border: 1px solid #2a3a4a;
      border-radius: 6px;
      opacity: 0.8;
    }

    .play-btn {
      width: 100%;
      padding: 10px;
      border: none;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      font-weight: 600;
    }

    .play-btn:hover {
      background: #2b7cff;
    }

    /* FILTERS */
    .arcade-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter {
      background: transparent;
      border: 1px solid #2a3a4a;
      color: #9fb3c8;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 8px;
      font-size: 12px;
    }

    .filter.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: white;
    }
  </style>
</head>

<body>
  <header>
    <h1>THE GREI SHOW ARCADE</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="arcade.html">Arcade</a>
      <a href="wheelit.html">Wheel It</a>
      <a href="astralthread.html">Astral Thread</a>
    </nav>
  </header>

  <div id="arcade-root"></div>

  <script type="module" src="arcade/engine/loader.js"></script>
</body>
</html>
