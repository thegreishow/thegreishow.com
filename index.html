<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,15,15,0.6), rgba(15,15,15,0.9));
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 860px;
      padding: 0 var(--space-md);
    }

    .hero h1 {
      font-size: clamp(4rem, 10vw, 7.5rem);
      line-height: 0.95;
      margin-bottom: 1rem;
      color: white;
    }

    .hero .tagline {
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 3rem;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .section {
      padding: var(--space-xl) 0;
    }

    .section-title {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: var(--space-lg);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="container">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="#listen">Music</a></li>
          <li><a href="#visuals">Visuals</a></li>
          <li><a href="#connect">Connect</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>THE GREI SHOW</h1>
      <p class="tagline">TRANSMISSIONS FROM THE EDGE</p>
    </div>
  </section>

  <!-- MUSIC -->
  <section class="section" id="listen" style="background: var(--bg-light);">
    <div class="container">
      <h2 class="section-title">NO DRAMA</h2>
      <div style="max-width: 680px; margin: 0 auto; text-align: center;">
        <audio controls style="width: 100%; margin: 2rem 0;">
          <source src="https://parallel-pink-xmters8f.edgeone.dev/The%20Grei%20Show%20-%20No%20Drama%20[][][].mp3" type="audio/mpeg">
        </audio>
        <p style="color: var(--text-light); font-size: 1.15rem;">
          A singular moment of clarity.<br>
          Pure signal. No filler.<br><br>
          The main event.
        </p>
      </div>
    </div>
  </section>

  <!-- VISUALS -->
  <section class="section" id="visuals">
    <div class="container">
      <h2 class="section-title">VISUAL TRANSMISSIONS</h2>
      <div style="max-width: 920px; margin: 0 auto;">
        <iframe width="100%" height="520" src="https://www.youtube.com/embed/dQw4w9wgxcq" title="Visuals" frameborder="0" allowfullscreen style="border-radius: 12px;"></iframe>
      </div>
    </div>
  </section>

  <!-- CONNECT -->
  <section class="section" id="connect" style="background: var(--bg-light);">
    <div class="container">
      <h2 class="section-title">ENTER THE CONVERSATION</h2>
      <form style="max-width: 520px; margin: 0 auto;">
        <input type="text" placeholder="YOUR NAME" style="width:100%; padding:1rem; margin-bottom:1rem; background:var(--bg); border:1px solid #333; color:white;" required>
        <input type="email" placeholder="EMAIL" style="width:100%; padding:1rem; margin-bottom:1rem; background:var(--bg); border:1px solid #333; color:white;" required>
        <textarea rows="6" placeholder="YOUR MESSAGE" style="width:100%; padding:1rem; margin-bottom:1rem; background:var(--bg); border:1px solid #333; color:white;" required></textarea>
        <button type="submit" style="width:100%; padding:1.25rem; background:var(--primary); color:#000; font-weight:600; border:none; cursor:pointer;">SEND TRANSMISSION</button>
      </form>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; THE GREI SHOW • ESTABLISHED 2026</p>
    </div>
  </footer>

  <script src="assets/js/navigation.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
