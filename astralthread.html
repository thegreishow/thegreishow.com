<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta http-equiv='refresh' content='0; url=books.html'>
  <title>Books | The Grei Show</title>
  <link rel='canonical' href='books.html'>
  <link rel='stylesheet' href='assets/css/base.css'>
  <link rel='stylesheet' href='assets/css/layout.css'>
  <link rel='stylesheet' href='assets/css/components.css'>
  <link rel='stylesheet' href='assets/css/theme.css'>
  <style>
    .redirect-shell {
      position: relative;
      z-index: 1;
      width: min(760px, calc(100% - 32px));
      min-height: 70vh;
      margin: 0 auto;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .redirect-panel {
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 8px;
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(14px);
    }

    .redirect-panel h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      line-height: 0.95;
      text-shadow: var(--glow-strong);
    }

    .redirect-panel p {
      margin: 0 0 18px;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .redirect-panel a {
      color: #fff;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div id='site-header'></div>
  <script src='shared/nav.js'></script>
  <main class='redirect-shell'>
    <section class='redirect-panel'>
      <h1>Books</h1>
      <p>Astral Thread now lives inside the Books section.</p>
      <a href='books.html'>Open Books</a>
    </section>
  </main>
  <script>window.location.replace('books.html');</script>
</body>
</html>
