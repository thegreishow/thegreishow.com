<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Grei Show | Official</title>

  <meta name="description" content="The official home of The Grei Show.">
  <meta property="og:title" content="The Grei Show | Official">
  <meta property="og:description" content="The official home of The Grei Show.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/portal.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

    body {
      color: var(--text);
      font-family: var(--font-body);
    }

    .home {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 54px;
    }

    .home-hero {
      min-height: calc(100vh - 116px);
      display: grid;
      place-items: center;
      text-align: center;
    }

    .home-hero-inner {
      display: grid;
      justify-items: center;
      gap: 18px;
    }

    .home-title {
      margin: 0;
      max-width: 980px;
      font-family: var(--font-heading);
      font-size: clamp(3.4rem, 12vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-shadow: var(--glow-strong);
    }

    .release-title {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .cover-art {
      width: min(280px, 72vw);
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 28px 90px rgba(0,0,0,0.42), 0 0 42px rgba(138,125,255,0.26);
      animation: floatArt 7s ease-in-out infinite;
    }

    .cover-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes floatArt {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      border: 0;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      background: linear-gradient(135deg, #1f6feb, #00a6ff);
      box-shadow: 0 0 28px rgba(0,166,255,0.22);
    }

    .cta:hover,
    .cta:focus-visible {
      transform: translateY(-3px);
      opacity: 1;
      outline: none;
    }

    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    @media (max-width: 760px) {
      .home {
        width: min(100% - 24px, 1080px);
      }

      .home-hero {
        min-height: auto;
        padding: 58px 0 44px;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <main class="home">
    <section class="home-hero" aria-labelledby="home-title">
      <div class="home-hero-inner">
        <h1 id="home-title" class="home-title">THE GREI SHOW</h1>
        <p class="release-title">No Drama</p>
        <div class="cover-art">
          <img src="assets/img/no-drama.jpg" alt="No Drama cover art">
        </div>
        <a class="cta" href="https://snd.click/qnbs" target="_blank" rel="noopener">Listen Now</a>
      </div>
    </section>

    <footer>THE GREI SHOW &copy; 2026</footer>
  </main>

  <script src="shared/nav.js"></script>

</body>
</html>
