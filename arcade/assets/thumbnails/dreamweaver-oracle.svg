<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Dreamweaver</title>
  <desc id="desc">A luminous gold dream-thread moving through a violet cosmic field toward a cyan dream symbol.</desc>
  <defs>
    <radialGradient id="bg" cx="55%" cy="42%" r="75%">
      <stop offset="0" stop-color="#2b1755"/>
      <stop offset=".55" stop-color="#0c0819"/>
      <stop offset="1" stop-color="#020204"/>
    </radialGradient>
    <linearGradient id="thread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2cf72"/>
      <stop offset="1" stop-color="#fff6c9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="#fff" opacity=".5">
    <circle cx="126" cy="100" r="2"/><circle cx="232" cy="224" r="3"/><circle cx="410" cy="82" r="2"/><circle cx="590" cy="190" r="2"/><circle cx="760" cy="90" r="3"/><circle cx="1040" cy="166" r="2"/><circle cx="1180" cy="78" r="2"/><circle cx="1100" cy="520" r="3"/><circle cx="920" cy="610" r="2"/><circle cx="390" cy="605" r="2"/><circle cx="180" cy="540" r="3"/>
  </g>
  <path d="M90 430 C260 265 372 565 520 370 S790 220 930 360" fill="none" stroke="url(#thread)" stroke-width="17" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="930" cy="360" r="96" fill="none" stroke="#66e4ff" stroke-width="9" filter="url(#glow)"/>
  <path d="M930 268 L962 328 L1030 360 L962 392 L930 452 L898 392 L830 360 L898 328 Z" fill="none" stroke="#66e4ff" stroke-width="8" filter="url(#glow)"/>
  <circle cx="930" cy="360" r="19" fill="#fff" filter="url(#glow)"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#fff">
    <text x="80" y="102" font-size="27" font-weight="700" letter-spacing="9" fill="#f2cf72">THE ASTRAL THREAD</text>
    <text x="75" y="625" font-size="82" font-weight="900" letter-spacing="-3">DREAMWEAVER</text>
    <text x="78" y="683" font-size="48" font-weight="700" letter-spacing="15" fill="#66e4ff">ORACLE</text>
  </g>
</svg>
